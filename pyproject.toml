[project]
name = "news-report"
version = "0.1.0"
description = "News Report For User Agent — Agent-oriented information processing middleware"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = []

[project.scripts]
build-catalog = "scripts.build_catalog:main"
generate-briefing = "scripts.generate_briefing:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.11",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]

[tool.ruff.lint.isort]
known-first-party = ["news_report"]

[tool.pytest.ini_options]
testpaths = ["tests"]
